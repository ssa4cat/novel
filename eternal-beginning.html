<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>亙古之初 - 文章閱讀</title>
<style>
body{margin:0;font-family:"Noto Serif TC","Microsoft JhengHei",serif;background:#FDFBF7;color:#4A4036;display:flex}
.sidebar{width:260px;background:#F3EBE1;padding:20px}
.nav-item{display:block;padding:10px;cursor:pointer}
.nav-item.active{background:#D4B895}
.content{flex:1;padding:20px}
</style>
</head>
<body>
<div class="sidebar">
<h2>亙古之初</h2>
<div id="nav"></div>
</div>
<div class="content">
<h1 id="title"></h1>
<div id="content">載入中...</div>
</div>
<script>
let data=[];
const nav=document.getElementById('nav');
const titleEl=document.getElementById('title');
const contentEl=document.getElementById('content');

fetch('data/eternal-beginning.json')
.then(r=>r.json())
.then(json=>{
 data=json;
 renderNav();
 load(0);
});

function renderNav(){
 nav.innerHTML='';
 data.forEach((ch,i)=>{
  const btn=document.createElement('div');
  btn.className='nav-item';
  btn.textContent=ch.label;
  btn.onclick=()=>load(i);
  nav.appendChild(btn);
 });
}

function load(i){
 const ch=data[i];
 titleEl.textContent=ch.title;
 fetch(ch.file)
 .then(r=>r.text())
 .then(html=>{
  contentEl.innerHTML=html;
 });
}
</script>
</body>
</html>
