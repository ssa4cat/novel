        function getInitialIndex() {
            const matched = window.location.hash.match(/^#article-(\d+)$/);
            if (!matched) return 0;
            const index = Number(matched[1]);
            return Number.isInteger(index) && index >= 0 && index < articlesData.length ? index : 0;
        }

        function updateActiveState(activeButton) {
            const items = sidebarList.querySelectorAll('.nav-item');
            items.forEach((item) => {
                const isActive = item === activeButton;
                item.classList.toggle('active', isActive);
                item.setAttribute('aria-current', isActive ? 'page' : 'false');
            });
        }

        function loadArticle(index, btnElement, options = {}) {
            const article = articlesData[index];
            if (!article) return;

            updateActiveState(btnElement);
            articleTitle.textContent = article.title;
            articleMeta.textContent = `第 ${index + 1} 篇，共 ${articlesData.length} 篇`;
            articleContent.textContent = article.content;
            document.title = `${article.title} - 貓臉魚`;

            if (window.location.hash !== `#article-${index}`) {
                history.replaceState(null, '', `#article-${index}`);
            }

            if (!options.preserveScroll) {
                mainContent.scrollTop = 0;
                window.scrollTo({ top: 0, behavior: 'auto' });
            }
        }

        function createNavItem(article, index) {
            const btn = document.createElement('button');
            btn.className = 'nav-item';
            btn.type = 'button';
            btn.textContent = article.title;
            btn.setAttribute('aria-label', `閱讀 ${article.title}`);
            btn.addEventListener('click', () => loadArticle(index, btn));
            return btn;
        }

        function initSidebar() {
            const initialIndex = getInitialIndex();

            articlesData.forEach((article, index) => {
                const btn = createNavItem(article, index);
                sidebarList.appendChild(btn);
            });

            const navButtons = sidebarList.querySelectorAll('.nav-item');
            const initialButton = navButtons[initialIndex] || navButtons[0];
            if (initialButton) {
                loadArticle(initialIndex, initialButton, { preserveScroll: true });
            }
        }

        window.addEventListener('hashchange', () => {
            const index = getInitialIndex();
            const navButtons = sidebarList.querySelectorAll('.nav-item');
            const targetButton = navButtons[index];
            if (targetButton) {
